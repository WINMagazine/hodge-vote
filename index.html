<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dan Hodge Trophy | Fan Vote</title>
    <style>
        :root {
            --win-gold: #cfa85e;
            --win-gold-hover: #b38d45;
            --win-dark: #0f172a;
            --win-darker: #020617;
            --card-bg: #ffffff;
            --text-dark: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, var(--win-darker) 0%, var(--win-dark) 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* --- HEADER --- */
        header {
            text-align: center;
            padding: 1rem 0.75rem 0.75rem;
            background: rgba(0,0,0,0.3);
            border-bottom: 3px solid var(--win-gold);
        }
        .logo-img { height: 50px; margin-bottom: 0.25rem; }
        h1 {
            font-size: 1.3rem;
            letter-spacing: 1px;
            margin-bottom: 0.1rem;
        }
        .subtitle {
            font-size: 0.85rem;
            color: var(--win-gold);
            font-weight: bold;
            text-transform: uppercase;
        }

        /* --- MAIN CONTAINER --- */
        main {
            flex: 1;
            padding: 0.75rem;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        /* --- CANDIDATE GRID --- */
        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 8px;
            display: flex;
            padding: 0.6rem 0.75rem;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s, border 0.2s;
            border: 3px solid transparent;
            color: var(--text-dark);
            align-items: center;
        }

        .card.selected {
            border-color: var(--win-gold);
            box-shadow: 0 0 12px rgba(207, 168, 94, 0.4);
            transform: scale(1.01);
        }

        .card-headshot {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 0.75rem;
            flex-shrink: 0;
            border: 2px solid #e2e8f0;
            display: none;
        }

        .card.selected .card-headshot {
            border-color: var(--win-gold);
        }

        @media (min-width: 600px) {
            .card-headshot {
                display: block;
            }
        }

        .card-color {
            width: 6px;
            height: 40px;
            border-radius: 3px;
            margin-right: 0.75rem;
            flex-shrink: 0;
        }

        .card-info {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-rank { font-size: 0.7rem; font-weight: bold; color: #64748b; }
        .card-name { font-size: 1rem; font-weight: 800; text-transform: uppercase; line-height: 1.1; }
        .card-school { font-size: 0.75rem; font-weight: 600; color: #475569; }

        .vote-indicator {
            margin-left: auto;
            font-size: 0.75rem;
            font-weight: 800;
            color: #94a3b8;
            flex-shrink: 0;
            padding-left: 0.5rem;
        }

        .card.selected .vote-indicator {
            color: var(--win-gold);
        }

        /* --- LOADING --- */
        .grid-loading {
            grid-column: 1 / -1;
            text-align: center;
            padding: 2rem;
            color: #94a3b8;
            font-size: 1rem;
        }

        /* --- FORM --- */
        .form-section {
            background: rgba(255,255,255,0.05);
            padding: 1rem;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .form-title {
            text-align: center;
            color: var(--win-gold);
            margin-bottom: 0.75rem;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }

        input[type="text"], input[type="email"], input[type="tel"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.4);
            color: white;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        input:focus {
            outline: none;
            border-color: var(--win-gold);
        }

        .consent-row {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: #cbd5e1;
            margin-bottom: 0.75rem;
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: var(--win-gold);
            color: var(--win-darker);
            font-size: 1.1rem;
            font-weight: 900;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.2s;
        }

        .submit-btn:hover { background: var(--win-gold-hover); }
        .submit-btn:disabled { background: #64748b; cursor: not-allowed; }

        .error-msg {
            color: #ef4444;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 1rem;
            min-height: 1.2em;
        }

        /* --- TICKER --- */
        .ticker-wrap {
            background: var(--win-gold);
            color: var(--win-darker);
            padding: 0.75rem 0;
            overflow: hidden;
            white-space: nowrap;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .ticker {
            display: inline-block;
            animation: ticker 25s linear infinite;
        }
        @keyframes ticker {
            0% { transform: translate3d(100%, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        /* --- THANK YOU SCREEN --- */
        #thank-you-view {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60vh;
            text-align: center;
        }
        .hidden { display: none !important; }

        .ty-title { font-size: 3rem; color: var(--win-gold); margin-bottom: 1rem; }
        .ty-sub { font-size: 1.5rem; margin-bottom: 2rem; }

        .reset-btn {
            background: transparent;
            border: 2px solid white;
            color: white;
            padding: 1rem 2rem;
            font-size: 1.2rem;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 1rem;
        }

        .reset-timer { color: #94a3b8; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="voting-view">
        <header>
            <img src="win-logo.png" alt="WIN Magazine" class="logo-img">
            <h1>DAN HODGE TROPHY</h1>
            <div class="subtitle">Official Fan Vote</div>
        </header>

        <main>
            <div class="grid" id="candidate-grid">
                <div class="grid-loading">Loading candidates...</div>
            </div>

            <div class="form-section">
                <div class="form-title">VOTER INFORMATION</div>
                <form id="vote-form">
                    <div class="form-grid">
                        <input type="text" id="fname" placeholder="First Name" required>
                        <input type="text" id="lname" placeholder="Last Name" required>
                        <input type="tel" id="phone" placeholder="Phone Number" required maxlength="14">
                        <input type="email" id="email" placeholder="Email Address" required>
                    </div>
                    <label class="consent-row">
                        <input type="checkbox" id="consent" checked required style="margin-top: 3px;">
                        <span>I consent to receive texts/emails from WIN Magazine regarding my free digital subscription and wrestling news.</span>
                    </label>
                    <div class="error-msg" id="error-msg"></div>
                    <button type="submit" class="submit-btn" id="submit-btn">Submit Vote</button>
                </form>
            </div>
        </main>

        <div class="ticker-wrap">
            <div class="ticker" id="ticker-text">
                CAST YOUR VOTE AT THE BOOTH • WHO WILL WIN THE 2026 DAN HODGE TROPHY? • VOTE NOW •
            </div>
        </div>
    </div>

    <div id="thank-you-view">
        <div class="ty-title">VOTE RECORDED!</div>
        <div class="ty-sub">Watch the big screen to see your vote drop.</div>
        <button class="reset-btn" onclick="resetForm()">Next Voter</button>
        <div class="reset-timer">Auto-resetting in <span id="countdown">5</span> seconds...</div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://aranzjtwsxaqtczswoiz.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFyYW56anR3c3hhcXRjenN3b2l6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NDYwMzYsImV4cCI6MjA4NzUyMjAzNn0.8ZKA0ZvZE6VJHQXTZRECDJTjtm5RUQNsSpw9dGO37Do';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const HEADSHOT_MAP = {
  'Mitchell Mesenbrink': 'headshots/mesenbrink.jpg',
  'Josh Barr': 'headshots/barr.jpg',
  'Jax Forrest': 'headshots/forrest.jpg',
  'Jesse Mendez': 'headshots/mendez.jpg',
  'Isaac Trumble': 'headshots/trumble.jpg',
  'Shayne Van Ness': 'headshots/vanness.jpg',
  'Levi Haines': 'headshots/haines.jpg',
  'Yonger Bastida': 'headshots/bastida.jpg',
  'Luke Lilledahl': 'headshots/lilledahl.jpg',
};

let candidates = [];
let selectedCandidateId = null;
let resetInterval;
let isSubmitting = false;

const grid = document.getElementById('candidate-grid');
const errorMsg = document.getElementById('error-msg');
const submitBtn = document.getElementById('submit-btn');

// --- Load candidates from Supabase ---
async function loadCandidates() {
  try {
    const { data, error } = await sb
      .from('candidates')
      .select('*')
      .order('display_order', { ascending: true });
    if (error) throw error;
    if (!data || data.length === 0) {
      grid.innerHTML = '<div class="grid-loading">No candidates available at this time.</div>';
      return;
    }
    candidates = data;
    renderCandidates();
  } catch (err) {
    console.error('Failed to load candidates:', err);
    grid.innerHTML = '<div class="grid-loading" style="color:#ef4444">Unable to load candidates. Please refresh.</div>';
  }
}

function renderCandidates() {
  grid.innerHTML = '';
  candidates.forEach((c, index) => {
    const div = document.createElement('div');
    div.className = 'card';
    div.dataset.id = c.id;
    div.onclick = () => selectCandidate(div, c.id);

    const weightDisplay = c.weight_class ? ` | ${c.weight_class}` : '';
    const recordDisplay = c.record ? ` | ${c.record}` : '';

    const headshot = HEADSHOT_MAP[c.name] || '';
    const posMap = {'Jax Forrest':'0 20%','Isaac Trumble':'0 15%','Luke Lilledahl':'0 25%'};
    const objPos = posMap[c.name] ? `object-position:${posMap[c.name]}` : '';
    div.innerHTML = `
      ${headshot ? `<img class="card-headshot" src="${headshot}" alt="${esc(c.name)}" style="${objPos}">` : `<div class="card-color" style="background:${c.color || '#888'}"></div>`}
      <div class="card-info">
        <div class="card-name">${esc(c.name)}</div>
        <div class="card-school">${esc(c.school || '')}${esc(weightDisplay)}</div>
      </div>
      <div class="vote-indicator">VOTE</div>
    `;
    grid.appendChild(div);
  });
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// --- Selection ---
function selectCandidate(cardElement, id) {
  document.querySelectorAll('.card').forEach(c => {
    c.classList.remove('selected');
    c.querySelector('.vote-indicator').innerText = 'VOTE';
  });
  cardElement.classList.add('selected');
  cardElement.querySelector('.vote-indicator').innerText = '\u2713';
  selectedCandidateId = id;
  errorMsg.textContent = '';
}

// --- Phone formatter ---
const phoneInput = document.getElementById('phone');
phoneInput.addEventListener('input', function (e) {
  let x = e.target.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,3})(\d{0,4})/);
  e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
});

// --- Submit ---
document.getElementById('vote-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  if (isSubmitting) return;

  // Spam check
  const lastVoteTime = sessionStorage.getItem('lastVoteTimestamp');
  if (lastVoteTime && (Date.now() - lastVoteTime < 30000)) {
    errorMsg.textContent = 'Please wait 30 seconds before submitting another vote.';
    return;
  }

  if (!selectedCandidateId) {
    errorMsg.textContent = 'Please select a wrestler before submitting!';
    return;
  }

  const firstName = document.getElementById('fname').value.trim();
  const lastName = document.getElementById('lname').value.trim();
  const email = document.getElementById('email').value.trim();
  const phoneRaw = phoneInput.value.trim();
  const phoneDigits = phoneRaw.replace(/\D/g, '');
  const consentChecked = document.getElementById('consent').checked;

  if (!firstName || !lastName) {
    errorMsg.textContent = 'Please enter your first and last name.';
    return;
  }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    errorMsg.textContent = 'Please enter a valid email address.';
    return;
  }
  if (phoneDigits.length !== 10) {
    errorMsg.textContent = 'Please enter a valid 10-digit phone number.';
    return;
  }

  const phone = '+1' + phoneDigits;

  isSubmitting = true;
  submitBtn.disabled = true;
  submitBtn.textContent = 'Submitting...';
  errorMsg.textContent = '';

  try {
    const { error } = await sb.from('votes').insert({
      candidate_id: selectedCandidateId,
      first_name: firstName,
      last_name: lastName,
      email: email,
      phone: phone,
      consent_texts: consentChecked,
      consent_emails: consentChecked,
    });
    if (error) throw error;

    sessionStorage.setItem('lastVoteTimestamp', Date.now());
    showThankYouScreen();
  } catch (err) {
    console.error('Submit error:', err);
    errorMsg.textContent = 'Something went wrong. Please try again.';
  } finally {
    isSubmitting = false;
    submitBtn.disabled = false;
    submitBtn.textContent = 'Submit Vote';
  }
});

// --- Thank You ---
function showThankYouScreen() {
  document.getElementById('voting-view').style.display = 'none';
  document.getElementById('thank-you-view').style.display = 'flex';

  let timeLeft = 5;
  document.getElementById('countdown').innerText = timeLeft;

  resetInterval = setInterval(() => {
    timeLeft--;
    document.getElementById('countdown').innerText = timeLeft;
    if (timeLeft <= 0) resetForm();
  }, 1000);
}

function resetForm() {
  clearInterval(resetInterval);
  document.getElementById('vote-form').reset();
  document.getElementById('consent').checked = true;
  selectedCandidateId = null;
  errorMsg.textContent = '';

  document.querySelectorAll('.card').forEach(c => {
    c.classList.remove('selected');
    c.querySelector('.vote-indicator').innerText = 'VOTE';
  });

  document.getElementById('thank-you-view').style.display = 'none';
  document.getElementById('voting-view').style.display = 'block';
  window.scrollTo(0, 0);
}

// --- Init ---
loadCandidates();
</script>
</body>
</html>
