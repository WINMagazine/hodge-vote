<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dan Hodge Trophy Vote | WIN Magazine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --bg: #f0eeeb;
    --bg-card: #faf9f7;
    --bg-input: #ffffff;
    --dark: #1a1816;
    --gold: #C9A84C;
    --gold-dim: #a8903a;
    --gold-glow: rgba(201, 168, 76, 0.15);
    --text: #1a1816;
    --text-muted: #8a8880;
    --text-subtle: #a8a49c;
    --border: #d8d5d0;
    --border-light: #e4e1dc;
    --error: #c44040;
    --success: #4a9e6a;
    --radius: 14px;
    --radius-sm: 8px;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: radial-gradient(ellipse at 50% 0%, #f7f5f2 0%, #f0eeeb 50%, #e8e5e0 100%);
    background-attachment: fixed;
    color: var(--text);
    min-height: 100dvh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -40%;
    right: -20%;
    width: 70vw;
    height: 70vw;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,168,76,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .page-wrapper {
    position: relative;
    z-index: 1;
    max-width: 800px;
    margin: 0 auto;
    padding: 0 16px 48px;
  }

  /* --- Header --- */
  .header {
    text-align: center;
    margin: 0 -16px 32px;
    padding: 24px 16px;
    background: var(--dark);
    position: relative;
    overflow: hidden;
  }

  .header::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .header-brand {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 12px;
    position: relative;
    z-index: 1;
  }

  .header-win-box {
    display: inline-flex;
    align-items: center;
    padding: 4px 14px;
    border: 1.5px solid rgba(201,168,76,0.6);
    border-radius: 4px;
    box-shadow: 0 0 20px rgba(201,168,76,0.1);
  }

  .header-win {
    font-size: 2.4rem;
    font-weight: 900;
    letter-spacing: 0.2em;
    color: var(--gold);
    line-height: 1;
  }

  .header-magazine {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
  }

  .header-divider {
    width: 120px;
    height: 2px;
    background: linear-gradient(90deg, transparent 0%, var(--gold) 30%, var(--gold) 70%, transparent 100%);
    margin: 14px auto;
    border-radius: 1px;
  }

  .header-title {
    font-size: 1.3rem;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
    letter-spacing: -0.02em;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
  }

  .header-title .accent {
    color: var(--gold);
    font-weight: 800;
  }

  .header-subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    color: rgba(255,255,255,0.35);
    margin-top: 6px;
    letter-spacing: 0.06em;
    position: relative;
    z-index: 1;
  }

  /* --- Candidate Grid --- */
  .candidates-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    margin-bottom: 28px;
  }

  @media (min-width: 540px) {
    .candidates-grid {
      grid-template-columns: 1fr 1fr;
    }
  }

  .candidate-card {
    position: relative;
    background: var(--bg-card);
    border: 1.5px solid var(--border-light);
    border-left: 4px solid var(--card-accent, var(--text-subtle));
    border-radius: var(--radius);
    padding: 20px 20px 20px 22px;
    cursor: pointer;
    transition: box-shadow 0.35s cubic-bezier(0.22, 1, 0.36, 1),
                border-color 0.3s ease;
    transform-style: preserve-3d;
    will-change: transform;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    box-shadow: 0 1px 2px rgba(26,24,22,0.04), 0 4px 12px rgba(26,24,22,0.03);
  }

  .candidate-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    background: radial-gradient(ellipse at 30% 0%, rgba(255,255,255,0.4) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .candidate-card:hover {
    box-shadow: 0 2px 4px rgba(26,24,22,0.06), 0 8px 24px rgba(26,24,22,0.08);
  }

  .candidate-card.selected {
    border-color: var(--gold);
    border-left-color: var(--gold);
    background: linear-gradient(135deg, #fdfcfa 0%, #faf7f0 100%);
    box-shadow: 0 0 0 1px var(--gold-dim),
                0 4px 16px rgba(201,168,76,0.12),
                0 8px 32px rgba(201,168,76,0.06);
  }

  .candidate-card input[type="radio"] {
    position: absolute;
    opacity: 0;
    pointer-events: none;
  }

  .candidate-name {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
    letter-spacing: -0.02em;
    position: relative;
    z-index: 1;
  }

  .candidate-school {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--card-accent, var(--text-muted));
    position: relative;
    z-index: 1;
  }

  .candidate-meta {
    display: flex;
    gap: 16px;
    margin-top: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-subtle);
    letter-spacing: 0.06em;
    position: relative;
    z-index: 1;
  }

  .candidate-meta span {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  .candidate-check {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    z-index: 1;
  }

  .candidate-card.selected .candidate-check {
    background: var(--gold);
    border-color: var(--gold);
    box-shadow: 0 2px 8px rgba(201,168,76,0.3);
  }

  .candidate-check svg {
    width: 14px;
    height: 14px;
    opacity: 0;
    transition: opacity 0.25s ease;
  }

  .candidate-card.selected .candidate-check svg {
    opacity: 1;
  }

  /* --- Section label --- */
  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .section-label.candidates-label {
    margin-bottom: 14px;
    margin-top: 24px;
  }

  /* --- Form Fields --- */
  .form-section {
    margin-bottom: 24px;
  }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .field-group {
    margin-bottom: 14px;
  }

  .field-group label {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 6px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .field-group input {
    width: 100%;
    padding: 14px 16px;
    font-size: 1rem;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    background: var(--bg-input);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    outline: none;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
    -webkit-appearance: none;
    appearance: none;
    box-shadow: inset 0 1px 3px rgba(26,24,22,0.04);
  }

  .field-group input::placeholder {
    color: #b0aca4;
  }

  .field-group input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px var(--gold-glow), inset 0 1px 3px rgba(26,24,22,0.04);
  }

  .field-group input.input-error {
    border-color: var(--error);
  }

  .field-error {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    color: var(--error);
    margin-top: 4px;
    min-height: 0;
    overflow: hidden;
    transition: all 0.25s ease;
  }

  /* --- Consent --- */
  .consent-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 24px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .consent-row input[type="checkbox"] {
    width: 22px;
    height: 22px;
    min-width: 22px;
    accent-color: var(--gold);
    margin-top: 1px;
    cursor: pointer;
  }

  .consent-row span {
    font-size: 0.82rem;
    color: var(--text-muted);
    line-height: 1.5;
  }

  /* --- Submit Button --- */
  .submit-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 18px 24px;
    font-size: 1.05rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #fff;
    background: var(--dark);
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    -webkit-tap-highlight-color: transparent;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(26,24,22,0.15), 0 1px 3px rgba(26,24,22,0.1);
  }

  .submit-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.06) 45%, rgba(255,255,255,0.12) 50%, rgba(255,255,255,0.06) 55%, transparent 60%);
    border-radius: inherit;
    transform: translateX(-150%);
    transition: transform 0.7s ease;
    pointer-events: none;
  }

  .submit-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(26,24,22,0.2), 0 2px 6px rgba(26,24,22,0.1);
  }

  .submit-btn:hover:not(:disabled)::after {
    transform: translateX(150%);
  }

  .submit-btn:active:not(:disabled) {
    transform: translateY(0);
  }

  .submit-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* --- Spinner --- */
  .spinner {
    display: inline-block;
    width: 22px;
    height: 22px;
    border: 3px solid rgba(255,255,255,0.25);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* --- Global Error --- */
  .global-error {
    background: rgba(196,64,64,0.06);
    border: 1px solid rgba(196,64,64,0.2);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    margin-bottom: 20px;
    font-size: 0.85rem;
    color: var(--error);
    display: none;
  }

  .global-error.visible {
    display: block;
  }

  /* --- Thank You Screen --- */
  .thank-you-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 60px 20px;
    min-height: 60dvh;
  }

  .thank-you-screen.visible {
    display: flex;
  }

  .thank-you-glass {
    background: rgba(250,249,247,0.7);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border-light);
    border-radius: 24px;
    padding: 48px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    box-shadow: 0 4px 24px rgba(26,24,22,0.06);
  }

  .checkmark-circle {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: var(--dark);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
    animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 8px 32px rgba(26,24,22,0.2);
  }

  .checkmark-circle svg {
    width: 52px;
    height: 52px;
    stroke: var(--gold);
    stroke-width: 3;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 60;
    stroke-dashoffset: 60;
    animation: drawCheck 0.5s 0.3s ease forwards;
  }

  @keyframes scaleIn {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  @keyframes drawCheck {
    to { stroke-dashoffset: 0; }
  }

  .thank-you-message {
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 8px;
    letter-spacing: -0.03em;
  }

  .thank-you-sub {
    font-size: 1rem;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .thank-you-reset {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-subtle);
    opacity: 0.6;
    margin-top: 20px;
    letter-spacing: 0.05em;
  }

  /* --- Loading skeleton --- */
  .loading-skeleton {
    text-align: center;
    padding: 40px 0;
    color: var(--text-muted);
  }

  .skeleton-spinner {
    display: inline-block;
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-bottom: 12px;
  }

  /* --- Utility --- */
  .hidden { display: none !important; }

  /* --- Footer --- */
  .footer {
    text-align: center;
    padding: 32px 0 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-subtle);
    letter-spacing: 0.08em;
  }
</style>
</head>

<div class="page-wrapper">
  <!-- Header -->
  <header class="header">
    <div class="header-brand">
      <div class="header-win-box">
        <span class="header-win">WIN</span>

  <div class="footer">&copy; WIN Magazine</div>

<script>

const SUPABASE_URL = 'https://aranzjtwsxaqtczswoiz.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFyYW56anR3c3hhcXRjenN3b2l6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NDYwMzYsImV4cCI6MjA4NzUyMjAzNn0.8ZKA0ZvZE6VJHQXTZRECDJTjtm5RUQNsSpw9dGO37Do';

// ---------------------------------------------------------------------------
// Supabase client

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let candidates = [];
let selectedCandidateId = null;
let isSubmitting = false;
const supportsHover = window.matchMedia('(hover: hover)').matches;

// ---------------------------------------------------------------------------
// DOM references
// ---------------------------------------------------------------------------
const $ = (id) => document.getElementById(id);
const form = $('voteForm');
const grid = $('candidatesGrid');
const globalError = $('globalError');
const thankYouScreen = $('thankYou');
const submitBtn = $('submitBtn');
const submitText = $('submitText');
const submitSpinner = $('submitSpinner');

// ---------------------------------------------------------------------------
// 3D Card Tilt (mouse-tracking, desktop only)
// ---------------------------------------------------------------------------
function initCardTilt(card) {
  if (!supportsHover) return;

  let currentRx = 0, currentRy = 0, targetRx = 0, targetRy = 0;
  let rafId = null;
  let isHovering = false;

  function lerp(a, b, t) { return a + (b - a) * t; }

  function animate() {
    currentRx = lerp(currentRx, targetRx, 0.12);
    currentRy = lerp(currentRy, targetRy, 0.12);

    if (Math.abs(currentRx - targetRx) < 0.01 && Math.abs(currentRy - targetRy) < 0.01) {
      currentRx = targetRx;
      currentRy = targetRy;
      card.style.transform = `perspective(600px) rotateY(${currentRy}deg) rotateX(${currentRx}deg)`;
      if (!isHovering) { rafId = null; return; }
    } else {
      card.style.transform = `perspective(600px) rotateY(${currentRy}deg) rotateX(${currentRx}deg)`;
    }
    rafId = requestAnimationFrame(animate);
  }

  card.addEventListener('mouseenter', () => {
    isHovering = true;
    if (!rafId) rafId = requestAnimationFrame(animate);
  });

  card.addEventListener('mousemove', (e) => {
    const rect = card.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width - 0.5;
    const y = (e.clientY - rect.top) / rect.height - 0.5;
    targetRy = x * 6;
    targetRx = -y * 6;
  });

  card.addEventListener('mouseleave', () => {
    isHovering = false;
    targetRx = 0;
    targetRy = 0;
    if (!rafId) rafId = requestAnimationFrame(animate);
  });
}

// ---------------------------------------------------------------------------
// Load candidates
// ---------------------------------------------------------------------------
async function loadCandidates() {
  try {
    const { data, error } = await sb
      .from('candidates')
      .select('*')
      .order('display_order', { ascending: true });

    if (error) throw error;
    if (!data || data.length === 0) {
      grid.innerHTML = '<div class="loading-skeleton">No candidates available at this time.</div>';
      return;
    }

    candidates = data;
    renderCandidates();
  } catch (err) {
    console.error('Failed to load candidates:', err);
    grid.innerHTML = '<div class="loading-skeleton" style="color:var(--error)">Unable to load candidates. Please refresh the page.</div>';
  }
}

function renderCandidates() {
  grid.innerHTML = '';
  candidates.forEach((c) => {
    const card = document.createElement('label');
    card.className = 'candidate-card';
    card.style.setProperty('--card-accent', c.color || '#888');
    card.setAttribute('data-id', c.id);

    card.innerHTML = `
      <input type="radio" name="candidate" value="${c.id}">
      <div class="candidate-check">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6,13 10,17 18,8" />
        </svg>
      </div>
      <div class="candidate-name">${esc(c.name)}</div>
      <div class="candidate-school">${esc(c.school || '')}</div>
      <div class="candidate-meta">
        ${c.weight_class ? `<span>${esc(c.weight_class)}</span>` : ''}
        ${c.record ? `<span>${esc(c.record)}</span>` : ''}
      </div>
    `;

    const radio = card.querySelector('input[type="radio"]');
    card.addEventListener('click', () => selectCandidate(c.id));
    radio.addEventListener('change', () => selectCandidate(c.id));

    initCardTilt(card);
    grid.appendChild(card);
  });
}

function selectCandidate(id) {
  selectedCandidateId = id;
  clearError('candidateError');
  document.querySelectorAll('.candidate-card').forEach((card) => {
    const isSelected = card.getAttribute('data-id') == id;
    card.classList.toggle('selected', isSelected);
    card.querySelector('input[type="radio"]').checked = isSelected;
  });
}

// ---------------------------------------------------------------------------
// Phone normalization
// ---------------------------------------------------------------------------
function normalizePhone(raw) {
  const digits = raw.replace(/[^\d]/g, '');
  if (digits.length === 11 && digits.startsWith('1')) {
    return '+' + digits;
  }
  if (digits.length === 10) {
    return '+1' + digits;
  }
  if (raw.startsWith('+') && digits.length === 11) {
    return '+' + digits;
  }
  return null;
}

// ---------------------------------------------------------------------------
// Validation
// ---------------------------------------------------------------------------
function validateForm() {
  let valid = true;
  clearAllErrors();

  if (!selectedCandidateId) {
    showError('candidateError', 'Please select a candidate');
    valid = false;
  }

  const firstName = $('firstName').value.trim();
  if (!firstName) {
    showError('firstNameError', 'First name is required');
    $('firstName').classList.add('input-error');
    valid = false;
  }

  const lastName = $('lastName').value.trim();
  if (!lastName) {
    showError('lastNameError', 'Last name is required');
    $('lastName').classList.add('input-error');
    valid = false;
  }

  const email = $('email').value.trim();
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!email) {
    showError('emailError', 'Email is required');
    $('email').classList.add('input-error');
    valid = false;
  } else if (!emailRegex.test(email)) {
    showError('emailError', 'Please enter a valid email address');
    $('email').classList.add('input-error');
    valid = false;
  }

  const phoneRaw = $('phone').value.trim();
  if (!phoneRaw) {
    showError('phoneError', 'Phone number is required');
    $('phone').classList.add('input-error');
    valid = false;
  } else {
    const normalized = normalizePhone(phoneRaw);
    if (!normalized) {
      showError('phoneError', 'Please enter a valid 10-digit US phone number');
      $('phone').classList.add('input-error');
      valid = false;
    }
  }

  return valid;
}

function showError(id, msg) {
  const el = $(id);
  if (el) el.textContent = msg;
}

function clearError(id) {
  const el = $(id);
  if (el) el.textContent = '';
}

function clearAllErrors() {
  ['candidateError', 'firstNameError', 'lastNameError', 'emailError', 'phoneError'].forEach(clearError);
  document.querySelectorAll('.input-error').forEach((el) => el.classList.remove('input-error'));
  globalError.classList.remove('visible');
  globalError.textContent = '';
}

function showGlobalError(msg) {
  globalError.textContent = msg;
  globalError.classList.add('visible');
}

// ---------------------------------------------------------------------------
// Submit
// ---------------------------------------------------------------------------
async function handleSubmit(e) {
  e.preventDefault();
  if (isSubmitting) return;
  if (!validateForm()) return;

  const candidate = candidates.find((c) => c.id == selectedCandidateId);
  if (!candidate) return;

  const firstName = $('firstName').value.trim();
  const lastName = $('lastName').value.trim();
  const email = $('email').value.trim();
  const phone = normalizePhone($('phone').value.trim());
  const consentChecked = $('consent').checked;

  setLoading(true);

  try {
    const { error } = await sb.from('votes').insert({
      candidate_id: candidate.id,
      first_name: firstName,
      last_name: lastName,
      email: email,
      phone: phone,
      consent_texts: consentChecked,
      consent_emails: consentChecked,
    });

    if (error) throw error;

    showThankYou(firstName);
  } catch (err) {
    console.error('Submit error:', err);
    showGlobalError('Something went wrong submitting your vote. Please try again.');
  } finally {
    setLoading(false);
  }
}

function setLoading(loading) {
  isSubmitting = loading;
  submitBtn.disabled = loading;
  submitText.classList.toggle('hidden', loading);
  submitSpinner.classList.toggle('hidden', !loading);
}

// ---------------------------------------------------------------------------
// Thank You / Reset
// ---------------------------------------------------------------------------
function showThankYou(firstName) {
  form.classList.add('hidden');
  $('thankYouMessage').textContent = `${firstName}, your vote has been cast!`;
  thankYouScreen.classList.add('visible');
  window.scrollTo({ top: 0, behavior: 'smooth' });

  setTimeout(() => {
    resetForm();
  }, 5000);
}

function resetForm() {
  thankYouScreen.classList.remove('visible');
  form.classList.remove('hidden');

  form.reset();
  selectedCandidateId = null;
  clearAllErrors();

  document.querySelectorAll('.candidate-card').forEach((card) => {
    card.classList.remove('selected');
    card.querySelector('input[type="radio"]').checked = false;
  });

  $('consent').checked = true;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ---------------------------------------------------------------------------
// Utility
// ---------------------------------------------------------------------------
function esc(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ---------------------------------------------------------------------------
// Phone input formatting (visual only)
// ---------------------------------------------------------------------------
$('phone').addEventListener('input', function () {
  let digits = this.value.replace(/[^\d]/g, '');
  if (digits.length > 10 && digits.startsWith('1')) {
    digits = digits.substring(1);
  }
  if (digits.length > 10) digits = digits.substring(0, 10);

  let formatted = '';
  if (digits.length > 0) formatted = '(' + digits.substring(0, 3);
  if (digits.length >= 3) formatted += ') ';
  if (digits.length > 3) formatted += digits.substring(3, 6);
  if (digits.length >= 6) formatted += '-';
  if (digits.length > 6) formatted += digits.substring(6, 10);

  if (digits.length >= 1) {
    this.value = formatted;
  }
});

// Remove error styling on focus
['firstName', 'lastName', 'email', 'phone'].forEach((id) => {
  $(id).addEventListener('focus', () => {
    $(id).classList.remove('input-error');
    clearError(id + 'Error');
  });
});

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
form.addEventListener('submit', handleSubmit);
loadCandidates();
</script>
