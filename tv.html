<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hodge Trophy | 3D Broadcast Display</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* === BASE === */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { overflow: hidden; background: #05080f; font-family: 'Inter', -apple-system, sans-serif; color: white; }

        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }

        /* === UI OVERLAY === */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10;
            pointer-events: none; display: flex; flex-direction: column; justify-content: space-between;
        }

        /* === HEADER === */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.2rem 2.5rem;
            border-top: 4px solid #cfa85e;
            background: linear-gradient(to bottom, rgba(0,0,0,0.92), rgba(0,0,0,0.4) 60%, transparent);
        }
        .hdr-left { display: flex; align-items: center; gap: 14px; }
        .live-badge {
            display: flex; align-items: center; gap: 8px;
            background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3);
            border-radius: 6px; padding: 5px 14px;
        }
        .live-dot {
            width: 10px; height: 10px; background: #ef4444; border-radius: 50%;
            box-shadow: 0 0 8px rgba(239,68,68,0.7); animation: pulse 1.2s ease-in-out infinite;
        }
        .live-text { font-size: 12px; font-weight: 900; color: #ef4444; letter-spacing: 0.15em; }
        .hdr-meta { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.45); letter-spacing: 0.04em; }
        .hdr-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.12); }

        .hdr-center { position: absolute; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 12px; }
        .logo { font-size: 1.6rem; font-weight: 900; color: #cfa85e; letter-spacing: 3px; }
        .logo-sub { font-size: 9px; font-weight: 600; color: rgba(255,255,255,0.25); letter-spacing: 0.3em; text-transform: uppercase; }

        .hdr-right { display: flex; align-items: center; gap: 12px; }
        .total-box {
            display: flex; align-items: center; gap: 10px;
            padding: 6px 18px; background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
        }
        .total-num { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
        .total-label { font-size: 8px; font-weight: 600; color: rgba(255,255,255,0.3); letter-spacing: 0.12em; text-transform: uppercase; line-height: 1.2; }

        /* === CANDIDATE LABELS === */
        #labels-container {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 11; pointer-events: none; overflow: hidden;
        }
        .tube-label-top, .tube-label-bottom {
            position: absolute; text-align: center; width: 160px;
            transform: translateX(-50%);
        }
        .tube-label-bar { width: 50px; height: 3px; border-radius: 2px; margin: 0 auto 8px; }
        .tube-label-name { font-size: 15px; font-weight: 900; text-transform: uppercase; line-height: 1.15; margin-bottom: 3px; text-shadow: 0 2px 10px rgba(0,0,0,0.95); }
        .tube-label-school { font-size: 9px; font-weight: 600; color: rgba(255,255,255,0.4); letter-spacing: 0.14em; text-transform: uppercase; text-shadow: 0 1px 6px rgba(0,0,0,0.95); }
        .tube-label-pct { font-size: 24px; font-weight: 800; text-shadow: 0 0 16px currentColor, 0 2px 10px rgba(0,0,0,0.95); }
        .tube-label-votes { font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.3); margin-top: 2px; }

        /* === CELEBRATION TEXT (THE SLAM) === */
        #celebration {
            position: absolute; bottom: 18%; width: 100%; text-align: center;
            opacity: 0; pointer-events: none; perspective: 1000px;
        }
        .celeb-small { font-size: 2rem; font-weight: 800; text-shadow: 0 4px 10px rgba(0,0,0,0.95); }
        .celeb-large {
            font-size: 6.5rem; font-weight: 900; text-transform: uppercase; margin: -5px 0; line-height: 1;
            background: linear-gradient(to bottom, #fff7d6, #cfa85e 40%, #8a6a27 80%, #fff7d6 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 15px 10px rgba(0,0,0,0.9)) drop-shadow(0px 0px 25px rgba(207,168,94,0.6));
        }
        .celeb-voter { font-size: 1.8rem; font-weight: 700; text-shadow: 0 4px 10px rgba(0,0,0,0.95); color: rgba(255,255,255,0.7); }

        .slam-in { animation: textSlam 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards; }
        .slam-out { animation: textFadeOut 0.5s ease-in forwards; }

        @keyframes textSlam {
            0% { transform: translateY(150px) scale(1.5) rotateX(-20deg); opacity: 0; filter: blur(8px); }
            50% { opacity: 1; filter: blur(0px); }
            80% { transform: translateY(-10px) scale(0.98) rotateX(5deg); }
            100% { transform: translateY(0) scale(1) rotateX(0deg); opacity: 1; filter: blur(0px); }
        }
        @keyframes textFadeOut {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(50px) scale(0.9); opacity: 0; }
        }

        /* === TICKERS === */
        .tickers { background: rgba(0,0,0,0.85); border-top: 1px solid rgba(255,255,255,0.08); pointer-events: auto; }
        .ticker-gold {
            background: linear-gradient(90deg, #b8941e, #cfa85e, #e2c56a, #cfa85e, #b8941e);
            color: #0a0a0e; padding: 8px 0; font-size: 11px; font-weight: 700;
            letter-spacing: 0.25em; text-transform: uppercase; text-align: center;
        }
        .ticker-gold .dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: rgba(0,0,0,0.25); margin: 0 16px; vertical-align: middle; }
        .ticker-dark { padding: 10px 0; overflow: hidden; white-space: nowrap; }
        .ticker-track { display: inline-block; animation: scrollTicker 30s linear infinite; }
        .ticker-msg {
            display: inline-flex; align-items: center; padding: 0 28px;
            font-size: 13px; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase;
        }
        .ticker-sep { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.2); margin: 0 4px; vertical-align: middle; }

        @keyframes scrollTicker { 0% { transform: translateX(0); } 100% { transform: translateX(-33.333%); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* === CONNECTION DOT === */
        #connectionDot {
            position: fixed; bottom: 70px; right: 14px; width: 10px; height: 10px; border-radius: 50%;
            background: #4ade80; box-shadow: 0 0 8px rgba(74,222,128,0.5); z-index: 100;
            transition: background 0.3s, box-shadow 0.3s;
        }
        #connectionDot.disconnected { background: #ef4444; box-shadow: 0 0 8px rgba(239,68,68,0.5); }

        /* === LOADING === */
        #loadingOverlay {
            position: fixed; inset: 0; z-index: 200;
            display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px;
            background: #05080f; color: rgba(255,255,255,0.3); font-size: 16px; font-weight: 600;
            transition: opacity 0.6s ease;
        }
        #loadingOverlay.hidden { opacity: 0; pointer-events: none; }
        .loader-spin { width: 28px; height: 28px; border: 2.5px solid rgba(255,255,255,0.08); border-top-color: #cfa85e; border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div id="ui-layer">
    <div class="header">
        <div class="hdr-left">
            <div class="live-badge"><div class="live-dot"></div><span class="live-text">LIVE</span></div>
            <div class="hdr-divider"></div>
            <span class="hdr-meta" id="hdrTime"></span>
            <div class="hdr-divider"></div>
            <span class="hdr-meta">CHAMPIONSHIP VOTE</span>
        </div>
        <div class="hdr-center">
            <span class="logo">WIN</span>
            <span class="logo-sub">Magazine</span>
        </div>
        <div class="hdr-right">
            <div class="total-box">
                <span class="total-num" id="totalVotes">0</span>
                <span class="total-label">Total<br>Votes</span>
            </div>
        </div>
    </div>

    <div id="celebration">
        <div class="celeb-small">NEW VOTE FOR</div>
        <div class="celeb-large" id="celeb-wrestler"></div>
        <div class="celeb-voter" id="celeb-voter"></div>
    </div>

    <div class="tickers">
        <div class="ticker-gold"><span class="dot"></span>WIN Magazine Collegiate Wrestling Tournament<span class="dot"></span></div>
        <div class="ticker-dark"><div class="ticker-track" id="tickerTrack"></div></div>
    </div>
</div>

<div id="labels-container"></div>
<div id="connectionDot" title="Realtime connection"></div>

<div id="loadingOverlay">
    <div class="loader-spin"></div>
    Loading 3D Engine...
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// ============================================================
// 1. SUPABASE (loaded via classic script tag below module)
// ============================================================
const SUPABASE_URL = 'https://aranzjtwsxaqtczswoiz.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFyYW56anR3c3hhcXRjenN3b2l6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NDYwMzYsImV4cCI6MjA4NzUyMjAzNn0.8ZKA0ZvZE6VJHQXTZRECDJTjtm5RUQNsSpw9dGO37Do';

// Wait for Supabase to load from CDN
function waitForSupabase() {
    return new Promise((resolve) => {
        if (window.supabase) return resolve(window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY));
        const check = setInterval(() => {
            if (window.supabase) { clearInterval(check); resolve(window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)); }
        }, 50);
    });
}

// ============================================================
// 2. STATE
// ============================================================
let candidates = [];
let candidateMap = {};        // { uuid: { index, name, school, color, vote_count } }
let totalVotesCount = 0;
let recentVotes = [];
let cylinderGroups = [];      // Three.js Groups
let beadMeshes = [];          // InstancedMesh per candidate
let realtimeChannel = null;

// Animation state
let droppingMarble = null;
let animStartTime = 0;
let isAnimating = false;
let celebQueue = [];

// DOM
const totalVotesEl = document.getElementById('totalVotes');
const tickerTrack = document.getElementById('tickerTrack');
const connectionDot = document.getElementById('connectionDot');
const loadingOverlay = document.getElementById('loadingOverlay');
const hdrTime = document.getElementById('hdrTime');
const celebEl = document.getElementById('celebration');
const celebWrestler = document.getElementById('celeb-wrestler');
const celebVoter = document.getElementById('celeb-voter');
const labelsContainer = document.getElementById('labels-container');

// ============================================================
// 3. THREE.JS SCENE SETUP
// ============================================================
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x05080f, 0.015);

const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 4, 26);
camera.lookAt(0, 3.5, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.3;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

// Programmatic HDRI environment (no external file needed)
const pmremGenerator = new THREE.PMREMGenerator(renderer);
pmremGenerator.compileEquirectangularShader();
const roomEnv = new RoomEnvironment();
const envTexture = pmremGenerator.fromScene(roomEnv, 0.04).texture;
scene.environment = envTexture;
scene.environmentIntensity = 0.4; // Tone down env reflections for darker look
roomEnv.dispose();

// ============================================================
// 4. STUDIO LIGHTING
// ============================================================
const ambientLight = new THREE.AmbientLight(0xffffff, 0.3); // Darker ambient for more contrast
scene.add(ambientLight);

// Key light (main spot from above) — brighter
const spotLight = new THREE.SpotLight(0xffffff, 900);
spotLight.position.set(0, 22, 12);
spotLight.angle = Math.PI / 3;
spotLight.penumbra = 0.5;
spotLight.decay = 1.2;
spotLight.castShadow = true;
spotLight.shadow.mapSize.set(1024, 1024);
scene.add(spotLight);
scene.add(spotLight.target);
spotLight.target.position.set(0, 2, 0);

// Fill light (softer, from left)
const fillLight = new THREE.SpotLight(0xfff0d0, 200);
fillLight.position.set(-15, 12, 8);
fillLight.angle = Math.PI / 4;
fillLight.penumbra = 0.8;
scene.add(fillLight);

// Gold rim light from behind — stronger
const backLight = new THREE.PointLight(0xcfa85e, 500, 70);
backLight.position.set(0, 6, -14);
scene.add(backLight);

// Floor accent lights — brighter gold pools
const floorLight1 = new THREE.PointLight(0xcfa85e, 120, 25);
floorLight1.position.set(-8, 0.3, 3);
scene.add(floorLight1);
const floorLight2 = new THREE.PointLight(0xcfa85e, 120, 25);
floorLight2.position.set(8, 0.3, 3);
scene.add(floorLight2);
const floorLightCenter = new THREE.PointLight(0xcfa85e, 80, 20);
floorLightCenter.position.set(0, 0.3, 4);
scene.add(floorLightCenter);

// ============================================================
// 5. FLOOR
// ============================================================
const floorGeo = new THREE.PlaneGeometry(60, 30);
const floorMat = new THREE.MeshStandardMaterial({
    color: 0x0a0a12,
    metalness: 0.6,
    roughness: 0.3,
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -0.05;
floor.receiveShadow = true;
scene.add(floor);

// ============================================================
// 6. MATERIALS
// ============================================================
const glassMaterial = new THREE.MeshPhysicalMaterial({
    metalness: 0.0,
    roughness: 0.02,
    transmission: 0.98,
    ior: 1.45,
    thickness: 0.15,        // Thinner = less milky distortion
    transparent: true,
    color: 0xffffff,
    envMapIntensity: 0.6,   // Much less env reflection = clearer glass
    side: THREE.DoubleSide,
    opacity: 0.3,           // Subtle glass tint
    depthWrite: false,      // Prevents z-fighting with beads inside
});

const metalBaseMaterial = new THREE.MeshStandardMaterial({
    color: 0x475569,
    metalness: 0.85,
    roughness: 0.25,
    envMapIntensity: 1.5,
});

const metalCapMaterial = new THREE.MeshStandardMaterial({
    color: 0x555566,
    metalness: 0.9,
    roughness: 0.2,
    envMapIntensity: 1.5,
});

// ============================================================
// 7. BUILD CYLINDERS
// ============================================================
function getSpacing(count) {
    if (count <= 4) return 3.5;
    if (count <= 6) return 3.0;
    if (count <= 8) return 2.6;
    return 2.4;
}

function getStartX(count) {
    const sp = getSpacing(count);
    return -((count - 1) * sp) / 2;
}

function buildCylinders() {
    // Clear existing
    cylinderGroups.forEach(g => scene.remove(g));
    cylinderGroups = [];
    beadMeshes.forEach(m => { if (m) { m.geometry.dispose(); m.material.dispose(); } });
    beadMeshes = [];
    labelsContainer.innerHTML = '';

    const count = candidates.length;
    const spacing = getSpacing(count);
    const startX = getStartX(count);
    const maxVotes = Math.max(...candidates.map(c => c.vote_count || 0), 1);

    candidates.forEach((c, i) => {
        const group = new THREE.Group();
        group.position.x = startX + i * spacing;
        group.position.y = 0;

        // Glass tube (open ends)
        const geoGlass = new THREE.CylinderGeometry(0.85, 0.85, 8.5, 32, 1, true);
        const meshGlass = new THREE.Mesh(geoGlass, glassMaterial);
        meshGlass.position.y = 4.5;
        meshGlass.castShadow = true;
        group.add(meshGlass);

        // Top cap ring
        const geoTopCap = new THREE.TorusGeometry(0.88, 0.08, 8, 32);
        const meshTopCap = new THREE.Mesh(geoTopCap, metalCapMaterial);
        meshTopCap.rotation.x = Math.PI / 2;
        meshTopCap.position.y = 8.75;
        group.add(meshTopCap);

        // Metal base
        const geoBase = new THREE.CylinderGeometry(1.05, 1.15, 0.6, 32);
        const meshBase = new THREE.Mesh(geoBase, metalBaseMaterial);
        meshBase.position.y = 0.3;
        meshBase.castShadow = true;
        meshBase.receiveShadow = true;
        group.add(meshBase);

        // Base rim
        const geoBaseRim = new THREE.TorusGeometry(1.1, 0.06, 8, 32);
        const meshBaseRim = new THREE.Mesh(geoBaseRim, metalCapMaterial);
        meshBaseRim.rotation.x = Math.PI / 2;
        meshBaseRim.position.y = 0.6;
        group.add(meshBaseRim);

        scene.add(group);
        cylinderGroups.push(group);

        // Beads
        const beadMesh = buildBeads(c, i, maxVotes);
        if (beadMesh) {
            group.add(beadMesh);
            beadMeshes.push(beadMesh);
        } else {
            beadMeshes.push(null);
        }
    });

    updateLabels();
}

// ============================================================
// 8. INSTANCED BEAD SYSTEM
// ============================================================
function buildBeads(candidate, index, maxVotes) {
    const voteCount = candidate.vote_count || 0;
    if (voteCount === 0) return null;

    const fillPct = voteCount / maxVotes;
    const maxBeads = 800;  // Fewer but larger = more visible individual beads
    const beadCount = Math.max(Math.floor(maxBeads * fillPct), 15);

    const hexColor = candidate.color || '#888888';
    const beadRadius = 0.12; // Bigger beads
    const geoBead = new THREE.SphereGeometry(beadRadius, 10, 8);
    const matBead = new THREE.MeshStandardMaterial({
        color: new THREE.Color(hexColor),
        metalness: 0.7,
        roughness: 0.25,
        envMapIntensity: 0.8,
    });

    const instancedBeads = new THREE.InstancedMesh(geoBead, matBead, beadCount);
    const dummy = new THREE.Object3D();
    const cylinderRadius = 0.65;
    let currentY = 0.7;

    for (let b = 0; b < beadCount; b++) {
        const r = cylinderRadius * Math.sqrt(Math.random());
        const theta = Math.random() * Math.PI * 2;
        const x = r * Math.cos(theta);
        const z = r * Math.sin(theta);

        dummy.position.set(x, currentY, z);
        dummy.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
        dummy.updateMatrix();
        instancedBeads.setMatrixAt(b, dummy.matrix);

        if (b % 25 === 0) currentY += 0.18; // Taller stacking
    }

    instancedBeads.instanceMatrix.needsUpdate = true;
    instancedBeads.castShadow = true;
    return instancedBeads;
}

function rebuildAllBeads() {
    const maxVotes = Math.max(...candidates.map(c => c.vote_count || 0), 1);
    candidates.forEach((c, i) => {
        const group = cylinderGroups[i];
        if (!group) return;

        // Remove old beads
        const oldBeads = beadMeshes[i];
        if (oldBeads) {
            group.remove(oldBeads);
            oldBeads.geometry.dispose();
            oldBeads.material.dispose();
        }

        // Build new
        const newBeads = buildBeads(c, i, maxVotes);
        if (newBeads) {
            group.add(newBeads);
        }
        beadMeshes[i] = newBeads;
    });
}

// ============================================================
// 9. LABELS (CSS positioned from 3D world coords)
// ============================================================
function updateLabels() {
    labelsContainer.innerHTML = '';
    const count = candidates.length;
    const spacing = getSpacing(count);
    const startX = getStartX(count);

    candidates.forEach((c, i) => {
        const worldX = startX + i * spacing;
        const pct = totalVotesCount > 0 ? ((c.vote_count || 0) / totalVotesCount * 100).toFixed(0) : '0';
        const hexColor = c.color || '#888888';

        // Project TOP of tube (name + school above)
        const vecTop = new THREE.Vector3(worldX, 9.5, 0);
        vecTop.project(camera);
        const topX = (vecTop.x * 0.5 + 0.5) * window.innerWidth;
        const topY = (-vecTop.y * 0.5 + 0.5) * window.innerHeight;

        const topLabel = document.createElement('div');
        topLabel.className = 'tube-label-top';
        topLabel.style.left = topX + 'px';
        topLabel.style.bottom = (window.innerHeight - topY + 5) + 'px';
        topLabel.innerHTML = `
            <div class="tube-label-bar" style="background:${hexColor}; box-shadow: 0 0 12px ${hexColor};"></div>
            <div class="tube-label-name">${esc(c.name)}</div>
            <div class="tube-label-school">${esc(c.school || '')}</div>
        `;
        labelsContainer.appendChild(topLabel);

        // Project BOTTOM of tube (percentage + vote count below)
        const vecBot = new THREE.Vector3(worldX, -0.5, 0);
        vecBot.project(camera);
        const botX = (vecBot.x * 0.5 + 0.5) * window.innerWidth;
        const botY = (-vecBot.y * 0.5 + 0.5) * window.innerHeight;

        const botLabel = document.createElement('div');
        botLabel.className = 'tube-label-bottom';
        botLabel.style.left = botX + 'px';
        botLabel.style.top = (botY + 10) + 'px';
        botLabel.innerHTML = `
            <div class="tube-label-pct" style="color:${hexColor}">${pct}%</div>
            <div class="tube-label-votes">${c.vote_count || 0} votes</div>
        `;
        labelsContainer.appendChild(botLabel);
    });
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ============================================================
// 10. MARBLE DROP ANIMATION
// ============================================================
function triggerDrop(targetIndex, wrestlerName, voterName, candidateColor) {
    if (isAnimating) {
        celebQueue.push({ targetIndex, wrestlerName, voterName, candidateColor });
        return;
    }
    isAnimating = true;

    // Update text
    celebWrestler.textContent = wrestlerName;
    celebVoter.textContent = `FROM ${voterName}`;

    // Reset classes
    celebEl.classList.remove('slam-out', 'slam-in');
    void celebEl.offsetWidth;

    // Delay text slam so marble starts first
    setTimeout(() => {
        celebEl.classList.add('slam-in');
    }, 300);

    // Create marble
    const hexColor = candidateColor || '#cfa85e';
    const geoSphere = new THREE.SphereGeometry(0.2, 16, 16);
    const matSphere = new THREE.MeshPhysicalMaterial({
        color: new THREE.Color(hexColor),
        metalness: 0.9,
        roughness: 0.1,
        clearcoat: 1.0,
        emissive: new THREE.Color(hexColor),
        emissiveIntensity: 0.3,
    });
    droppingMarble = new THREE.Mesh(geoSphere, matSphere);
    droppingMarble.userData.targetIndex = targetIndex;
    scene.add(droppingMarble);

    animStartTime = Date.now();
}

function processNextCeleb() {
    if (celebQueue.length === 0) { isAnimating = false; return; }
    const next = celebQueue.shift();
    isAnimating = false;
    triggerDrop(next.targetIndex, next.wrestlerName, next.voterName, next.candidateColor);
}

// ============================================================
// 11. TICKER
// ============================================================
function buildTicker() {
    const messages = [];
    if (candidates.length > 0 && totalVotesCount > 0) {
        const sorted = [...candidates].sort((a, b) => (b.vote_count || 0) - (a.vote_count || 0));
        const leader = sorted[0];
        const pct = ((leader.vote_count || 0) / totalVotesCount * 100).toFixed(1);
        if (sorted.length > 1 && (leader.vote_count || 0) > (sorted[1].vote_count || 0) * 1.5) {
            messages.push(`${leader.name} leads by a huge margin!`);
        }
        messages.push(`${leader.name} leads with ${pct}% of the vote`);
    }
    messages.push('Vote now via QR code or website!');
    messages.push('Battle for second heats up!');
    recentVotes.slice(0, 5).forEach(v => messages.push(`${v.firstName} voted for ${v.candidateName}`));
    if (messages.length === 0) messages.push('Cast your vote now!');

    tickerTrack.innerHTML = '';
    for (let rep = 0; rep < 3; rep++) {
        messages.forEach(msg => {
            const span = document.createElement('span');
            span.className = 'ticker-msg';
            span.textContent = msg.toUpperCase();
            tickerTrack.appendChild(span);
            const sep = document.createElement('span');
            sep.className = 'ticker-sep';
            tickerTrack.appendChild(sep);
        });
    }
    tickerTrack.style.animationDuration = Math.max(messages.length * 5, 25) + 's';
}

// ============================================================
// 12. CLOCK
// ============================================================
function updateClock() {
    hdrTime.textContent = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
}

// ============================================================
// 13. SUPABASE INTEGRATION
// ============================================================
let sb;

async function loadVoteCounts() {
    try {
        const { data, error } = await sb.from('vote_counts').select('*').order('display_order', { ascending: true });
        if (error) throw error;
        if (!data || data.length === 0) {
            loadingOverlay.querySelector('.loader-spin').style.display = 'none';
            loadingOverlay.textContent = 'No candidates available.';
            return;
        }
        candidates = data;
        candidateMap = {};
        totalVotesCount = 0;
        candidates.forEach((c, i) => {
            candidateMap[c.id] = { index: i, name: c.name, school: c.school, color: c.color, vote_count: c.vote_count || 0 };
            totalVotesCount += c.vote_count || 0;
        });

        buildCylinders();
        updateTotalDisplay();
        buildTicker();
        loadingOverlay.classList.add('hidden');
    } catch (err) {
        console.error('Failed to load:', err);
        loadingOverlay.innerHTML = '<div style="color:#ef4444">Error loading. Retrying...</div>';
        setTimeout(loadVoteCounts, 5000);
    }
}

function updateTotalDisplay() {
    totalVotesEl.textContent = totalVotesCount.toLocaleString();
}

function subscribeToVotes() {
    realtimeChannel = sb.channel('tv-votes-3d')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'votes' }, handleNewVote)
        .subscribe(status => {
            if (status === 'SUBSCRIBED') {
                connectionDot.classList.remove('disconnected');
                console.log('Realtime: connected');
            } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT' || status === 'CLOSED') {
                connectionDot.classList.add('disconnected');
                setTimeout(() => {
                    if (realtimeChannel) sb.removeChannel(realtimeChannel);
                    subscribeToVotes();
                }, 5000);
            }
        });
}

async function handleNewVote(payload) {
    const vote = payload.new;
    if (!vote) return;
    const cid = vote.candidate_id;
    const fn = (vote.first_name || 'Fan').toUpperCase();
    const ln = vote.last_name || '';
    const lastInitial = ln ? ln.charAt(0).toUpperCase() + '.' : '';
    const voterDisplay = `${fn} ${lastInitial}`;

    const info = candidateMap[cid];
    if (info) {
        info.vote_count++;
        // Update the candidates array too
        const cand = candidates.find(c => c.id === cid);
        if (cand) cand.vote_count = info.vote_count;
        totalVotesCount++;
        updateTotalDisplay();

        // Ticker
        recentVotes.unshift({ firstName: fn, candidateName: info.name });
        if (recentVotes.length > 20) recentVotes = recentVotes.slice(0, 20);
        buildTicker();

        // Trigger 3D marble drop + celebration text
        triggerDrop(info.index, info.name, voterDisplay, info.color);
    }

    // Re-fetch authoritative counts
    try {
        const { data, error } = await sb.from('vote_counts').select('*').order('display_order', { ascending: true });
        if (!error && data) {
            totalVotesCount = 0;
            data.forEach(d => {
                if (candidateMap[d.id]) {
                    candidateMap[d.id].vote_count = d.vote_count || 0;
                }
                totalVotesCount += d.vote_count || 0;
            });
            candidates = data;
            rebuildAllBeads();
            updateLabels();
            updateTotalDisplay();
        }
    } catch (err) { console.warn('Re-fetch failed:', err); }
}

// ============================================================
// 14. RENDER LOOP
// ============================================================
function animate() {
    requestAnimationFrame(animate);

    // Marble drop animation
    if (droppingMarble) {
        const elapsed = (Date.now() - animStartTime) / 1000;
        const duration = 1.2;

        if (elapsed < duration) {
            const t = elapsed / duration;

            const count = candidates.length;
            const spacing = getSpacing(count);
            const startX = getStartX(count);
            const targetX = startX + (droppingMarble.userData.targetIndex * spacing);

            // Quadratic Bezier: start below camera → arc high → land in target cylinder
            const p0 = new THREE.Vector3(0, -4, 8);
            const p1 = new THREE.Vector3(targetX * 0.5, 14, 4);
            const p2 = new THREE.Vector3(targetX, 7.0, 0);

            const u = 1 - t;
            const pos = new THREE.Vector3()
                .addScaledVector(p0, u * u)
                .addScaledVector(p1, 2 * u * t)
                .addScaledVector(p2, t * t);

            droppingMarble.position.copy(pos);

            // Scale down slightly as it gets further from camera
            const scale = 1.0 - t * 0.3;
            droppingMarble.scale.setScalar(scale);
        } else {
            // Impact!
            const impactPos = droppingMarble.position.clone();
            scene.remove(droppingMarble);
            droppingMarble.geometry.dispose();
            droppingMarble.material.dispose();
            droppingMarble = null;

            // Golden impact flash
            const flash = new THREE.PointLight(0xffd700, 800, 12);
            flash.position.copy(impactPos);
            scene.add(flash);

            let flashFade = setInterval(() => {
                flash.intensity -= 40;
                if (flash.intensity <= 0) {
                    scene.remove(flash);
                    flash.dispose();
                    clearInterval(flashFade);
                }
            }, 25);

            // Hide celebration text after 3.5s
            setTimeout(() => {
                celebEl.classList.remove('slam-in');
                celebEl.classList.add('slam-out');
                setTimeout(() => {
                    celebEl.classList.remove('slam-out');
                    processNextCeleb();
                }, 600);
            }, 3500);
        }
    }

    renderer.render(scene, camera);
}

// ============================================================
// 15. WINDOW RESIZE
// ============================================================
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    updateLabels();
});

// ============================================================
// 16. INIT
// ============================================================
(async function init() {
    updateClock();
    setInterval(updateClock, 1000);

    // Start render loop immediately
    animate();

    // Initialize Supabase
    sb = await waitForSupabase();

    // Load data and build scene
    await loadVoteCounts();
    subscribeToVotes();
})();
</script>
