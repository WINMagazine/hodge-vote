<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hodge Trophy | 3D Broadcast Display</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { overflow: hidden; background: #ffffff; font-family: 'Inter', -apple-system, sans-serif; color: #1a1a1a; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10;
            pointer-events: none; display: flex; flex-direction: column; justify-content: space-between;
        }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.2rem 2.5rem; border-top: 4px solid #cfa85e;
            background: linear-gradient(to bottom, rgba(255,255,255,0.95), rgba(255,255,255,0.6) 60%, transparent);
        }
        .hdr-left { display: flex; align-items: center; gap: 14px; }
        .live-badge {
            display: flex; align-items: center; gap: 8px;
            background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3);
            border-radius: 6px; padding: 5px 14px;

        .live-dot { width: 10px; height: 10px; background: #ef4444; border-radius: 50%; box-shadow: 0 0 8px rgba(239,68,68,0.7); animation: pulse 1.2s ease-in-out infinite; }
        .live-text { font-size: 12px; font-weight: 900; color: #ef4444; letter-spacing: 0.15em; }

        .hdr-divider { width: 1px; height: 20px; background: rgba(0,0,0,0.15); }
        .hdr-center { position: absolute; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 12px; }
        .logo { font-size: 1.6rem; font-weight: 900; color: #cfa85e; letter-spacing: 3px; }
        .logo-sub { font-size: 9px; font-weight: 600; color: rgba(0,0,0,0.35); letter-spacing: 0.3em; text-transform: uppercase; }

        .ticker-gold .dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: rgba(0,0,0,0.25); margin: 0 16px; vertical-align: middle; }
        .ticker-dark { padding: 10px 0; overflow: hidden; white-space: nowrap; color: #1a1a1a; }
        .ticker-track { display: inline-block; animation: scrollTicker 30s linear infinite; }
        .ticker-msg { display: inline-flex; align-items: center; padding: 0 28px; font-size: 13px; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; }
        .ticker-sep { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: rgba(0,0,0,0.25); margin: 0 4px; vertical-align: middle; }
        @keyframes scrollTicker { 0% { transform: translateX(0); } 100% { transform: translateX(-33.333%); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        #connectionDot { position: fixed; bottom: 70px; right: 14px; width: 10px; height: 10px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 8px rgba(74,222,128,0.5); z-index: 100; transition: background 0.3s, box-shadow 0.3s; }
        #connectionDot.disconnected { background: #ef4444; box-shadow: 0 0 8px rgba(239,68,68,0.5); }

        #loadingOverlay { position: fixed; inset: 0; z-index: 200; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; background: #ffffff; color: rgba(0,0,0,0.3); font-size: 16px; font-weight: 600; transition: opacity 0.6s ease; }
        #loadingOverlay.hidden { opacity: 0; pointer-events: none; }
        .loader-spin { width: 28px; height: 28px; border: 2.5px solid rgba(255,255,255,0.08); border-top-color: #cfa85e; border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

<script type="module">
import * as THREE from 'three';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// ============================================================
// 1. SUPABASE
// ============================================================
const SUPABASE_URL = 'https://aranzjtwsxaqtczswoiz.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFyYW56anR3c3hhcXRjenN3b2l6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NDYwMzYsImV4cCI6MjA4NzUyMjAzNn0.8ZKA0ZvZE6VJHQXTZRECDJTjtm5RUQNsSpw9dGO37Do';

function waitForSupabase() {
    return new Promise((resolve) => {
        if (window.supabase) return resolve(window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY));
        const check = setInterval(() => {
            if (window.supabase) { clearInterval(check); resolve(window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)); }
        }, 50);
    });
}

// ============================================================
// 2. STATE
// ============================================================
let candidates = [];
let candidateMap = {};
let totalVotesCount = 0;
let recentVotes = [];
let cylinderGroups = [];
let liquidData = [];       // { bodyMesh, surfaceMesh, targetHeight, currentHeight, color, rippleTime }
let realtimeChannel = null;

let droppingDrop = null;
let animStartTime = 0;
let isAnimating = false;
let celebQueue = [];
let clock = new THREE.Clock();

const totalVotesEl = document.getElementById('totalVotes');
const tickerTrack = document.getElementById('tickerTrack');
const connectionDot = document.getElementById('connectionDot');
const loadingOverlay = document.getElementById('loadingOverlay');
const hdrTime = document.getElementById('hdrTime');
const celebEl = document.getElementById('celebration');
const celebWrestler = document.getElementById('celeb-wrestler');
const celebVoter = document.getElementById('celeb-voter');
const labelsContainer = document.getElementById('labels-container');

// ============================================================
// 3. THREE.JS SCENE
// ============================================================
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);
scene.fog = new THREE.FogExp2(0xffffff, 0.008);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 8, 40);
camera.lookAt(0, 5, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.4;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

const pmremGenerator = new THREE.PMREMGenerator(renderer);
pmremGenerator.compileEquirectangularShader();
const roomEnv = new RoomEnvironment();
const envTexture = pmremGenerator.fromScene(roomEnv, 0.04).texture;
scene.environment = envTexture;
scene.environmentIntensity = 0.8;
roomEnv.dispose();

// ============================================================
// 4. STUDIO LIGHTING
// ============================================================
scene.add(new THREE.AmbientLight(0xffd8a0, 0.4));

// Soft even lighting — no spotlights that create floor beams
scene.add(new THREE.DirectionalLight(0xfff4e0, 1.5));
const dirLight = new THREE.DirectionalLight(0xfff4e0, 1.0);
dirLight.position.set(0, 15, 10);
scene.add(dirLight);

const dirLight2 = new THREE.DirectionalLight(0xffecd0, 0.6);
dirLight2.position.set(-10, 10, 5);
scene.add(dirLight2);

const dirLight3 = new THREE.DirectionalLight(0xffecd0, 0.4);
dirLight3.position.set(10, 10, 5);
scene.add(dirLight3);

// Floor removed — pure white background

// ============================================================
// 6. CONSTANTS & MATERIALS
// ============================================================
const TUBE_RADIUS = 1.65;
const TUBE_HEIGHT = 10.5;
const TUBE_INNER = TUBE_RADIUS - 0.075;
const BASE_RADIUS = 2.025;
const LIQUID_MAX_HEIGHT = TUBE_HEIGHT - 0.45; // Leave a gap at top
const BASE_Y = 0.9; // Where liquid starts (top of base)

// Fresnel glass
const glassShaderMat = new THREE.ShaderMaterial({
    transparent: true, depthWrite: false, side: THREE.DoubleSide,
    uniforms: {
        uEdgeColor: { value: new THREE.Color(0xeef4ff) },
        uFresnelPower: { value: 2.5 },
        uOpacityMin: { value: 0.01 },
        uOpacityMax: { value: 0.25 },
    },
    vertexShader: `
        varying vec3 vNormal; varying vec3 vViewDir;
        void main() {
            vNormal = normalize(normalMatrix * normal);
            vec4 wp = modelMatrix * vec4(position, 1.0);
            vViewDir = normalize(cameraPosition - wp.xyz);
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `,
    fragmentShader: `
        uniform vec3 uEdgeColor; uniform float uFresnelPower; uniform float uOpacityMin; uniform float uOpacityMax;
        varying vec3 vNormal; varying vec3 vViewDir;
        void main() {
            float f = pow(1.0 - abs(dot(normalize(vNormal), normalize(vViewDir))), uFresnelPower);
            gl_FragColor = vec4(uEdgeColor, mix(uOpacityMin, uOpacityMax, f));
        }
    `,
});

const metalBaseMat = new THREE.MeshStandardMaterial({ color: 0x8a8a9a, metalness: 0.92, roughness: 0.15, envMapIntensity: 2.0 });
const goldRimMat = new THREE.MeshStandardMaterial({ color: 0xcfa85e, metalness: 0.95, roughness: 0.1, envMapIntensity: 2.0 });

// ============================================================
// 7. LIQUID SURFACE SHADER
// ============================================================
function createLiquidSurfaceMaterial(color) {
    return new THREE.ShaderMaterial({
        transparent: true,
        side: THREE.DoubleSide,
        uniforms: {
            uTime: { value: 0.0 },
            uColor: { value: color.clone() },
            uRippleTime: { value: -10.0 },  // negative = no active ripple
            uRippleOrigin: { value: new THREE.Vector2(0, 0) },
        },
        vertexShader: `
            uniform float uTime;
            uniform float uRippleTime;
            uniform vec2 uRippleOrigin;
            varying vec2 vUv;
            varying vec3 vNormal;
            varying vec3 vViewDir;

            void main() {
                vUv = uv;
                vec3 pos = position;

                // Ambient gentle waves
                float wave1 = sin(pos.x * 3.0 + uTime * 1.5) * 0.03;
                float wave2 = sin(pos.y * 4.0 + uTime * 2.0) * 0.025;
                float wave3 = sin((pos.x + pos.y) * 2.5 + uTime * 1.0) * 0.02;
                pos.z += wave1 + wave2 + wave3;

                // Impact ripple
                float rippleAge = uTime - uRippleTime;
                if (rippleAge > 0.0 && rippleAge < 3.0) {
                    float dist = distance(pos.xy, uRippleOrigin);
                    float rippleRadius = rippleAge * 1.8;
                    float ringWidth = 0.4;
                    float ring = smoothstep(rippleRadius - ringWidth, rippleRadius, dist) *
                                 smoothstep(rippleRadius + ringWidth, rippleRadius, dist);
                    float decay = exp(-rippleAge * 1.5);
                    float amplitude = 0.12 * decay;
                    pos.z += sin(dist * 12.0 - rippleAge * 8.0) * ring * amplitude;
                }

                vec4 worldPos = modelMatrix * vec4(pos, 1.0);
                vViewDir = normalize(cameraPosition - worldPos.xyz);
                vNormal = normalize(normalMatrix * vec3(0.0, 0.0, 1.0));
                gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
            }
        `,
        fragmentShader: `
            uniform vec3 uColor;
            uniform float uTime;
            uniform float uRippleTime;
            varying vec2 vUv;
            varying vec3 vNormal;
            varying vec3 vViewDir;

            void main() {
                float fresnel = pow(1.0 - abs(dot(normalize(vNormal), normalize(vViewDir))), 2.0);
                vec3 highlight = vec3(1.0);
                vec3 col = mix(uColor, highlight, fresnel * 0.5);

                // Bright specular highlight
                col += fresnel * 0.3;

                // Ripple brightening
                float rippleAge = uTime - uRippleTime;
                if (rippleAge > 0.0 && rippleAge < 1.5) {
                    col += vec3(0.2) * exp(-rippleAge * 3.0);
                }

                float alpha = 0.85 + fresnel * 0.15;
                gl_FragColor = vec4(col, alpha);
            }
        `,
    });
}

// ============================================================
// 8. LIQUID BODY MATERIAL
// ============================================================
function createLiquidBodyMaterial(color) {
    const c = color.clone();
    const hsl = {};
    c.getHSL(hsl);
    if (hsl.l < 0.3) c.setHSL(hsl.h, Math.min(hsl.s * 1.2, 1.0), 0.3);
    return new THREE.MeshPhysicalMaterial({
        color: c,
        metalness: 0.05,
        roughness: 0.15,
        envMapIntensity: 1.0,
        transparent: true,
        opacity: 0.8,
        emissive: c,
        emissiveIntensity: 0.15,
    });
}

// ============================================================
// 9. BUILD CYLINDERS & LIQUID
// ============================================================
function getSpacing(count) {
    if (count <= 4) return 9.0;
    if (count <= 6) return 7.5;
    if (count <= 8) return 6.5;
    if (count <= 10) return 5.6;
    return 5.0;
}
function getStartX(count) { return -((count - 1) * getSpacing(count)) / 2; }

function buildCylinders() {
    // Clear old
    cylinderGroups.forEach(g => scene.remove(g));
    cylinderGroups = [];
    liquidData.forEach(ld => {
        if (ld.bodyMesh) { ld.bodyMesh.geometry.dispose(); ld.bodyMesh.material.dispose(); }
        if (ld.surfaceMesh) { ld.surfaceMesh.geometry.dispose(); ld.surfaceMesh.material.dispose(); }
    });
    liquidData = [];
    labelsContainer.innerHTML = '';

    const count = candidates.length;
    const spacing = getSpacing(count);
    const startX = getStartX(count);
    candidates.forEach((c, i) => {
        const group = new THREE.Group();
        group.position.x = startX + i * spacing;

        // Glass tube
        const meshGlass = new THREE.Mesh(
            new THREE.CylinderGeometry(TUBE_RADIUS, TUBE_RADIUS, TUBE_HEIGHT, 48, 1, true),
            glassShaderMat.clone()
        );
        meshGlass.position.y = TUBE_HEIGHT / 2 + BASE_Y;
        group.add(meshGlass);

        // Edge rings
        const ringMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.6 });
        const topRing = new THREE.Mesh(new THREE.TorusGeometry(TUBE_RADIUS + 0.02, 0.025, 8, 64), ringMat);
        topRing.rotation.x = Math.PI / 2; topRing.position.y = TUBE_HEIGHT + BASE_Y;
        group.add(topRing);
        const botRing = new THREE.Mesh(new THREE.TorusGeometry(TUBE_RADIUS + 0.02, 0.025, 8, 64), ringMat.clone());
        botRing.rotation.x = Math.PI / 2; botRing.position.y = BASE_Y; botRing.material.opacity = 0.4;
        group.add(botRing);

        // Gold cap
        const topCap = new THREE.Mesh(new THREE.TorusGeometry(TUBE_RADIUS + 0.04, 0.05, 8, 48), goldRimMat);
        topCap.rotation.x = Math.PI / 2; topCap.position.y = TUBE_HEIGHT + BASE_Y;
        group.add(topCap);

        // Base
        const baseMesh = new THREE.Mesh(new THREE.CylinderGeometry(BASE_RADIUS, BASE_RADIUS + 0.15, 0.6, 48), metalBaseMat);
        baseMesh.position.y = 0.3; baseMesh.castShadow = true; baseMesh.receiveShadow = true;
        group.add(baseMesh);
        const baseRim = new THREE.Mesh(new THREE.TorusGeometry(BASE_RADIUS + 0.05, 0.04, 8, 48), goldRimMat);
        baseRim.rotation.x = Math.PI / 2; baseRim.position.y = BASE_Y;
        group.add(baseRim);

        // Vertical specular lines
        const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.08 });
        for (let a = 0; a < Math.PI * 2; a += Math.PI / 3) {
            const line = new THREE.Mesh(new THREE.CylinderGeometry(0.006, 0.006, TUBE_HEIGHT - 0.2, 4), lineMat);
            line.position.set(Math.cos(a) * (TUBE_RADIUS + 0.01), TUBE_HEIGHT / 2 + BASE_Y, Math.sin(a) * (TUBE_RADIUS + 0.01));
            group.add(line);
        }

        scene.add(group);
        cylinderGroups.push(group);

        // --- LIQUID ---
        const fillPct = totalVotesCount > 0 ? (c.vote_count || 0) / totalVotesCount : 0;
        const liquidHeight = Math.max(fillPct * LIQUID_MAX_HEIGHT, 0.05);
        const hexColor = c.color || '#888888';
        const liquidColor = new THREE.Color(hexColor);

        // Liquid body (cylinder)
        const bodyGeo = new THREE.CylinderGeometry(TUBE_INNER - 0.02, TUBE_INNER - 0.02, liquidHeight, 32);
        const bodyMat = createLiquidBodyMaterial(liquidColor);
        const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
        bodyMesh.position.y = BASE_Y + liquidHeight / 2;
        group.add(bodyMesh);

        // Liquid surface (disc with wave shader)
        const surfGeo = new THREE.CircleGeometry(TUBE_INNER - 0.03, 48);
        const surfMat = createLiquidSurfaceMaterial(liquidColor);
        const surfMesh = new THREE.Mesh(surfGeo, surfMat);
        surfMesh.rotation.x = -Math.PI / 2;
        surfMesh.position.y = BASE_Y + liquidHeight;
        group.add(surfMesh);

        liquidData.push({
            bodyMesh,
            surfaceMesh: surfMesh,
            bodyMaterial: bodyMat,
            surfaceMaterial: surfMat,
            targetHeight: liquidHeight,
            currentHeight: liquidHeight,
            color: liquidColor,
            rippleTime: -10,
        });
    });

    updateLabels();
}

// ============================================================
// 10. UPDATE LIQUID LEVELS
// ============================================================
function updateLiquidLevels() {
    candidates.forEach((c, i) => {
        if (!liquidData[i]) return;
        const fillPct = totalVotesCount > 0 ? (c.vote_count || 0) / totalVotesCount : 0;
        liquidData[i].targetHeight = Math.max(fillPct * LIQUID_MAX_HEIGHT, 0.05);
    });
}

function triggerRipple(candidateIndex) {
    const ld = liquidData[candidateIndex];
    if (!ld) return;
    ld.rippleTime = clock.getElapsedTime();
    ld.surfaceMaterial.uniforms.uRippleTime.value = ld.rippleTime;
    ld.surfaceMaterial.uniforms.uRippleOrigin.value.set(
        (Math.random() - 0.5) * 0.3,
        (Math.random() - 0.5) * 0.3
    );
}

// ============================================================
// 11. DROP ANIMATION (liquid droplet)
// ============================================================
function triggerDrop(targetIndex, wrestlerName, voterName, candidateColor) {
    if (isAnimating) {
        celebQueue.push({ targetIndex, wrestlerName, voterName, candidateColor });
        return;
    }
    isAnimating = true;

    celebWrestler.textContent = wrestlerName;
    celebVoter.textContent = `FROM ${voterName}`;
    celebEl.classList.remove('slam-out', 'slam-in');
    void celebEl.offsetWidth;
    setTimeout(() => { celebEl.classList.add('slam-in'); }, 300);

    const hexColor = candidateColor || '#cfa85e';
    const dropColor = new THREE.Color(hexColor);
    // Elongated droplet shape
    const geoSphere = new THREE.SphereGeometry(0.15, 12, 12);
    geoSphere.scale(1, 1.4, 1);
    const matDrop = new THREE.MeshPhysicalMaterial({
        color: dropColor,
        metalness: 0.05,
        roughness: 0.05,
        envMapIntensity: 2.0,
        transparent: true,
        opacity: 0.9,
        emissive: dropColor,
        emissiveIntensity: 0.4,
    });
    droppingDrop = new THREE.Mesh(geoSphere, matDrop);
    droppingDrop.userData.targetIndex = targetIndex;
    scene.add(droppingDrop);
    animStartTime = Date.now();
}

function processNextCeleb() {
    if (celebQueue.length === 0) { isAnimating = false; return; }
    const next = celebQueue.shift();
    isAnimating = false;
    triggerDrop(next.targetIndex, next.wrestlerName, next.voterName, next.candidateColor);
}

// ============================================================
// 12. TICKER
// ============================================================
function buildTicker() {
    const messages = [];
    if (candidates.length > 0 && totalVotesCount > 0) {
        const sorted = [...candidates].sort((a, b) => (b.vote_count || 0) - (a.vote_count || 0));
        const leader = sorted[0];
        const pct = ((leader.vote_count || 0) / totalVotesCount * 100).toFixed(1);
        if (sorted.length > 1 && (leader.vote_count || 0) > (sorted[1].vote_count || 0) * 1.5)
            messages.push(`${leader.name} leads by a huge margin!`);
        messages.push(`${leader.name} leads with ${pct}% of the vote`);
    }
    messages.push('Vote now via QR code or website!');
    messages.push('Battle for second heats up!');
    recentVotes.slice(0, 5).forEach(v => messages.push(`${v.firstName} voted for ${v.candidateName}`));
    if (messages.length === 0) messages.push('Cast your vote now!');

    tickerTrack.innerHTML = '';
    for (let rep = 0; rep < 3; rep++) {
        messages.forEach(msg => {
            const span = document.createElement('span'); span.className = 'ticker-msg'; span.textContent = msg.toUpperCase();
            tickerTrack.appendChild(span);
            const sep = document.createElement('span'); sep.className = 'ticker-sep'; tickerTrack.appendChild(sep);
        });
    }
    tickerTrack.style.animationDuration = Math.max(messages.length * 5, 25) + 's';
}

// ============================================================
// 13. CLOCK
// ============================================================
function updateClockDisplay() {
    hdrTime.textContent = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
}

// ============================================================
// 14. SUPABASE
// ============================================================
let sb;

async function loadVoteCounts() {
    try {
        const { data, error } = await sb.from('vote_counts').select('*').order('display_order', { ascending: true });
        if (error) throw error;
        if (!data || data.length === 0) {
            loadingOverlay.querySelector('.loader-spin').style.display = 'none';
            loadingOverlay.textContent = 'No candidates available.';
            return;
        }
        candidates = data;
        candidateMap = {};
        totalVotesCount = 0;
        candidates.forEach((c, i) => {
            candidateMap[c.id] = { index: i, name: c.name, school: c.school, color: c.color, vote_count: c.vote_count || 0 };
            totalVotesCount += c.vote_count || 0;
        });
        buildCylinders();
        totalVotesEl.textContent = totalVotesCount.toLocaleString();
        buildTicker();
        loadingOverlay.classList.add('hidden');
    } catch (err) {
        console.error('Failed to load:', err);
        loadingOverlay.innerHTML = '<div style="color:#ef4444">Error loading. Retrying...</div>';
        setTimeout(loadVoteCounts, 5000);
    }
}

function subscribeToVotes() {
    realtimeChannel = sb.channel('tv-votes-liquid')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'votes' }, handleNewVote)
        .subscribe(status => {
            if (status === 'SUBSCRIBED') connectionDot.classList.remove('disconnected');
            else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT' || status === 'CLOSED') {
                connectionDot.classList.add('disconnected');
                setTimeout(() => { if (realtimeChannel) sb.removeChannel(realtimeChannel); subscribeToVotes(); }, 5000);
            }
        });
}

async function handleNewVote(payload) {
    const vote = payload.new;
    if (!vote) return;
    const cid = vote.candidate_id;
    const fn = (vote.first_name || 'Fan').toUpperCase();
    const ln = vote.last_name || '';
    const lastInitial = ln ? ln.charAt(0).toUpperCase() + '.' : '';
    const voterDisplay = `${fn} ${lastInitial}`;

    const info = candidateMap[cid];
    if (info) {
        info.vote_count++;
        const cand = candidates.find(c => c.id === cid);
        if (cand) cand.vote_count = info.vote_count;
        totalVotesCount++;
        totalVotesEl.textContent = totalVotesCount.toLocaleString();

        recentVotes.unshift({ firstName: fn, candidateName: info.name });
        if (recentVotes.length > 20) recentVotes = recentVotes.slice(0, 20);
        buildTicker();

        triggerDrop(info.index, info.name, voterDisplay, info.color);
    }

    try {
        const { data, error } = await sb.from('vote_counts').select('*').order('display_order', { ascending: true });
        if (!error && data) {
            totalVotesCount = 0;
            data.forEach(d => {
                if (candidateMap[d.id]) candidateMap[d.id].vote_count = d.vote_count || 0;
                totalVotesCount += d.vote_count || 0;
            });
            candidates = data;
            updateLiquidLevels();
            updateLabels();
            totalVotesEl.textContent = totalVotesCount.toLocaleString();
        }
    } catch (err) { console.warn('Re-fetch failed:', err); }
}

// ============================================================
// 15. LABELS
// ============================================================
function updateLabels() {
    labelsContainer.innerHTML = '';
    const count = candidates.length;
    const spacing = getSpacing(count);
    const startX = getStartX(count);

    candidates.forEach((c, i) => {
        const worldX = startX + i * spacing;
        const pct = totalVotesCount > 0 ? ((c.vote_count || 0) / totalVotesCount * 100).toFixed(0) : '0';
        const hexColor = c.color || '#888888';

        const vecTop = new THREE.Vector3(worldX, TUBE_HEIGHT + 1.8, 0);
        vecTop.project(camera);
        const topX = (vecTop.x * 0.5 + 0.5) * window.innerWidth;
        const topY = (-vecTop.y * 0.5 + 0.5) * window.innerHeight;
        const topLabel = document.createElement('div');
        topLabel.className = 'tube-label-top';
        topLabel.style.left = topX + 'px';
        topLabel.style.bottom = (window.innerHeight - topY + 5) + 'px';
        topLabel.innerHTML = `<div class="tube-label-bar" style="background:${hexColor}; box-shadow: 0 0 12px ${hexColor};"></div><div class="tube-label-name">${esc(c.name)}</div><div class="tube-label-school">${esc(c.school || '')}</div>`;
        labelsContainer.appendChild(topLabel);

        const vecBot = new THREE.Vector3(worldX, -0.8, 0);
        vecBot.project(camera);
        const botX = (vecBot.x * 0.5 + 0.5) * window.innerWidth;
        const botY = (-vecBot.y * 0.5 + 0.5) * window.innerHeight;
        const botLabel = document.createElement('div');
        botLabel.className = 'tube-label-bottom';
        botLabel.style.left = botX + 'px';
        botLabel.style.top = (botY + 10) + 'px';
        botLabel.innerHTML = `<div class="tube-label-pct" style="color:${hexColor}">${pct}%</div><div class="tube-label-votes">${c.vote_count || 0} votes</div>`;
        labelsContainer.appendChild(botLabel);
    });
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ============================================================
// 16. RENDER LOOP
// ============================================================
function animate() {
    requestAnimationFrame(animate);
    const elapsed = clock.getElapsedTime();
    const dt = clock.getDelta();

    // Update liquid surfaces (ambient waves)
    liquidData.forEach(ld => {
        if (ld.surfaceMaterial) ld.surfaceMaterial.uniforms.uTime.value = elapsed;

        // Smoothly lerp liquid height to target
        const diff = ld.targetHeight - ld.currentHeight;
        if (Math.abs(diff) > 0.001) {
            ld.currentHeight += diff * Math.min(dt * 3.0, 1.0); // Smooth rise

            const group = cylinderGroups[liquidData.indexOf(ld)];
            if (!group) return;

            // Update body cylinder height
            group.remove(ld.bodyMesh);
            ld.bodyMesh.geometry.dispose();
            const newGeo = new THREE.CylinderGeometry(TUBE_INNER - 0.02, TUBE_INNER - 0.02, Math.max(ld.currentHeight, 0.01), 32);
            ld.bodyMesh.geometry = newGeo;
            ld.bodyMesh.position.y = BASE_Y + ld.currentHeight / 2;
            group.add(ld.bodyMesh);

            // Update surface position
            ld.surfaceMesh.position.y = BASE_Y + ld.currentHeight;
        }
    });

    // Drop animation
    if (droppingDrop) {
        const dropElapsed = (Date.now() - animStartTime) / 1000;
        const duration = 1.0;

        if (dropElapsed < duration) {
            const t = dropElapsed / duration;
            const count = candidates.length;
            const spacing = getSpacing(count);
            const startX = getStartX(count);
            const targetX = startX + (droppingDrop.userData.targetIndex * spacing);
            const targetIdx = droppingDrop.userData.targetIndex;
            const liquidH = liquidData[targetIdx] ? liquidData[targetIdx].currentHeight : 1;
            const targetY = BASE_Y + liquidH;

            // Bezier arc: start above camera → arc high → drop into liquid surface
            const p0 = new THREE.Vector3(0, 0, 10);
            const p1 = new THREE.Vector3(targetX * 0.5, 14, 5);
            const p2 = new THREE.Vector3(targetX, targetY, 0);

            const u = 1 - t;
            const pos = new THREE.Vector3()
                .addScaledVector(p0, u * u)
                .addScaledVector(p1, 2 * u * t)
                .addScaledVector(p2, t * t);

            droppingDrop.position.copy(pos);
            // Flatten into droplet shape as it falls
            const stretch = 1 + t * 0.5;
            droppingDrop.scale.set(1 / stretch, stretch, 1 / stretch);
            droppingDrop.scale.multiplyScalar(1 - t * 0.4);
        } else {
            // Impact — trigger ripple
            const targetIdx = droppingDrop.userData.targetIndex;
            scene.remove(droppingDrop);
            droppingDrop.geometry.dispose();
            droppingDrop.material.dispose();
            droppingDrop = null;

            // Ripple on the liquid surface
            triggerRipple(targetIdx);

            // Splash flash
            const ld = liquidData[targetIdx];
            if (ld) {
                const flashY = BASE_Y + ld.currentHeight;
                const group = cylinderGroups[targetIdx];
                const flash = new THREE.PointLight(0xffffff, 600, 8);
                flash.position.set(0, flashY + 0.5, 0);
                group.add(flash);
                let fadeInt = setInterval(() => {
                    flash.intensity -= 30;
                    if (flash.intensity <= 0) { group.remove(flash); flash.dispose(); clearInterval(fadeInt); }
                }, 25);
            }

            // Hide celebration
            setTimeout(() => {
                celebEl.classList.remove('slam-in');
                celebEl.classList.add('slam-out');
                setTimeout(() => { celebEl.classList.remove('slam-out'); processNextCeleb(); }, 600);
            }, 3500);
        }
    }

    renderer.render(scene, camera);
}

// ============================================================
// 17. RESIZE
// ============================================================
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    updateLabels();
});

// ============================================================
// 18. INIT
// ============================================================
(async function init() {
    updateClockDisplay();
    setInterval(updateClockDisplay, 1000);
    animate();
    sb = await waitForSupabase();
    await loadVoteCounts();
    subscribeToVotes();
})();
</script>
